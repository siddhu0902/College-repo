<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Zoom Project</title>

<style>
    body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 30px;
        height: 100vh;
        margin: 0;
    }

    img {
        width: 200px;
        cursor: pointer;
        transition: transform 0.3s ease;
        border-radius: 50%;
    }

    /* Zoomed image style */
    .zoomed {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(2.5);
        z-index: 1000;
        cursor: zoom-out;
    }

    /* Dark overlay */
    .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        z-index: 999;
    }
</style>
</head>

<body>

<img src="merc.webp" alt="Mercury" onclick="zoomImage(this)">
<img src="sun.webp" alt="Sun" onclick="zoomImage(this)">
<img src="venus.webp" alt="Venus" onclick="zoomImage(this)">

<script>
    let currentImage = null;
    let overlay = null;

    function zoomImage(img) {
        if (currentImage) return;

        currentImage = img;
        img.classList.add("zoomed");

        overlay = document.createElement("div");
        overlay.className = "overlay";
        document.body.appendChild(overlay);
    }

    document.addEventListener("keydown", function (event) {
        if (event.key === "Escape" && currentImage) {
            currentImage.classList.remove("zoomed");
            currentImage = null;

            if (overlay) {
                overlay.remove();
                overlay = null;
            }
        }
    });
</script>

</body>
</html>
