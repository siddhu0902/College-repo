<!DOCTYPE html>
<html>
<head>
    <title>Complex Table</title>
</head>
<body>

<h2 align="center">A complex table</h2>

<table border="1" width="100%" align="center">
    <tr>
        <td>Invoice #123456789</td>
        <td align="right">14 January 2025</td>
    </tr>

    <tr>
        <td>
            <b>Pay to:</b><br>
            Acme Billing Co.<br>
            123 Main St.<br>
            Cityville, NA 12345
        </td>
        <td>
            <b>Customer:</b><br>
            John Smith<br>
            321 Willow Way<br>
            Southeast Northwestershire, MA 54321
        </td>
    </tr>
    <tr>
        <th>Name / Description</th>
        <th>Qty</th>
        <th>@</th>
        <th>Cost</th>
    </tr>

    <tr>
        <td>Paperclips</td>
        <td>1000</td>
        <td>0.01</td>
        <td>10.00</td>
    </tr>

    <tr>
        <td>Staples (box)</td>
        <td>100</td>
        <td>1.00</td>
        <td>100.00</td>
    </tr>

    <tr>
        <td colspan="3" align="right">Subtotal</td>
        <td>110.00</td>
    </tr>

    <tr>
        <td colspan="3" align="right">Tax</td>
        <td>8%</td>
    </tr>
</table>

</body>
</html>
