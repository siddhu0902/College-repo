<html>
    <body>
        <script type="text/javascript">
            var book;
            book =prompt("enter book name","Null")
            if(book=="history"){
                document.write("<b>History book is available</b>");
            }
            else if(book=="geography"){
                document.write("<b>Geography book is available</b>");
            }
            else if(book=="maths"){
                document.write("<b>Maths book is available</b>");
            }
            else if(book=="english"){
                document.write("<b>English book is available</b>");
            }
            else{
                document.write("<b>Book not available</b>");
            }
        </script>
    </body>
</html>
