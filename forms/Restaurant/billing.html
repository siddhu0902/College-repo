<header>

<nav>

<section class="billing">

<h2>Online Order Billing</h2>

<form>

<label>Name</label>
<input type="text" required>

<label>Phone</label>
<input type="text" required>

<label>Select Item</label>
<select id="item">
<option value="350">Butter Chicken</option>
<option value="280">Paneer Tikka</option>
<option value="300">Biryani</option>
<option value="250">Pizza</option>
<option value="270">Pasta</option>
</select>

<label>Quantity</label>
<input type="number" id="qty">

<button type="button" onclick="calculate()">Generate Bill</button>

<h3>Total Price: ₹ <span id="total">0</span></h3>

</form>

</section>

<footer>

</footer>
